<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient: Deep slate to rich dark midnight -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Outer Ring Gradient: Glowing Neon Teal to Emerald -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Logo Letter Gradient: Pure white to silver grey -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Dynamic Growth Curve Gradient: Emerald to Royal Blue -->
    <linearGradient id="growthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>

    <!-- Glow Filter for the tech feel -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background container -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" />
  
  <!-- Outer glowing accent ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#ringGrad)" stroke-width="14" filter="url(#neonGlow)" opacity="0.85" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2" />

  <!-- Monogram R and rising trend lines -->
  <g>
    <!-- Modern Geometric 'R' with financial growth theme built-in -->
    <!-- The vertical bar is a strong pillars block -->
    <rect x="170" y="150" width="48" height="212" rx="10" fill="url(#letterGrad)" />
    
    <!-- The loop of the R -->
    <path d="M170 150h95c45 0 75 22 75 60s-30 60-75 60h-95V150zm48 40v80h47c18 0 27-8 27-40s-9-40-27-40h-47z" fill="url(#letterGrad)" />
    
    <!-- The dynamic growth swoop leg of the R representing an exponential financial chart -->
    <path d="M235 270c15 0 35 20 60 62l55 80h-58l-52-78c-12-18-22-24-38-24h-17v40h-48V270h98z" fill="url(#letterGrad)" />

    <!-- Rising Neon Accent Arrow (representing investment & wealth growth) -->
    <path d="M110 370c80-15 170-65 292-120" fill="none" stroke="url(#growthGrad)" stroke-width="16" stroke-linecap="round" filter="url(#neonGlow)" />
    <path d="M370 230h40v40" fill="none" stroke="url(#growthGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)" />
    
    <!-- Rising sub-curve -->
    <path d="M130 405c70-12 150-55 240-100" fill="none" stroke="url(#ringGrad)" stroke-width="8" stroke-linecap="round" opacity="0.5" />
  </g>
</svg>
