<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Fix for sandbox/iframe environments where window.fetch has only a getter
      (function() {
        try {
          const originalFetch = window.fetch;
          let customFetch = originalFetch;
          
          Object.defineProperty(window, 'fetch', {
            get() {
              return customFetch;
            },
            set(val) {
              customFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine window.fetch directly, attempting proxy fallback...", e);
          try {
            let customFetch = window.fetch;
            const originalGlobalThis = window.globalThis || window;
            const handler = {
              get(target, prop) {
                if (prop === 'fetch') return customFetch;
                const value = Reflect.get(target, prop);
                if (typeof value === 'function') {
                  return value.bind(target);
                }
                return value;
              },
              set(target, prop, value) {
                if (prop === 'fetch') {
                  customFetch = value;
                  return true;
                }
                return Reflect.set(target, prop, value);
              }
            };
            const proxy = new Proxy(originalGlobalThis, handler);
            Object.defineProperty(window, 'globalThis', {
              value: proxy,
              configurable: true,
              writable: true
            });
          } catch (err2) {
            console.error("Failed to apply all fetch getter bypasses:", err2);
          }
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Razchly adalah asisten keuangan pribadi, pelacakan investasi multi-aset, simulasi trading AI, dan pengelola produktivitas Grab Partner dalam satu dashboard terintegrasi." />
    <title>Razchly — Ekosistem Keuangan & Asisten Produktivitas AI</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- PWA meta tags -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
  </head>
  <body>
    <div id="root">
      <style>
        body { margin: 0; background-color: #0f172a; } /* Default dark background */
        .initial-loader {
          display: flex;
          flex-direction: column;
          height: 100vh;
          width: 100vw;
          background-color: #0f172a;
          padding: 1.5rem;
          box-sizing: border-box;
          overflow: hidden;
        }
        @media (min-width: 768px) { .initial-loader { padding: 3rem; } }
        .il-header { display: flex; justify-content: space-between; margin-bottom: 2rem; max-width: 80rem; margin-left: auto; margin-right: auto; width: 100%; }
        .il-flex { display: flex; align-items: center; gap: 0.75rem; }
        .il-circle { width: 2.5rem; height: 2.5rem; border-radius: 9999px; background-color: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
        .il-rect-small { width: 9rem; height: 1.5rem; border-radius: 0.375rem; background-color: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
        .il-rect-medium { width: 7rem; height: 2.5rem; border-radius: 9999px; background-color: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
        
        .il-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; max-width: 80rem; margin-left: auto; margin-right: auto; width: 100%; flex: 1; }
        @media (min-width: 768px) { .il-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
        .il-col-2 { display: flex; flex-direction: column; gap: 1.5rem; height: 100%; }
        @media (min-width: 768px) { .il-col-2 { grid-column: span 2 / span 2; } }
        .il-card-1 { height: 11rem; background-color: #1e293b; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .il-card-2 { flex: 1; background-color: #1e293b; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
        .il-card-3 { height: 15rem; background-color: #1e293b; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }

        .il-shimmer {
          position: relative;
          overflow: hidden;
        }
        .il-shimmer::after {
          content: "";
          position: absolute;
          top: 0; right: 0; bottom: 0; left: 0;
          transform: translateX(-100%);
          background-image: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.02) 20%, rgba(255,255,255,0.05) 60%, rgba(255,255,255,0));
          animation: il-shimmer 2s infinite;
        }
        @keyframes il-shimmer { 100% { transform: translateX(100%); } }
      </style>
      <div class="initial-loader">
        <div class="il-header">
          <div class="il-flex">
            <div class="il-circle il-shimmer"></div>
            <div class="il-rect-small il-shimmer"></div>
          </div>
          <div class="il-rect-medium il-shimmer"></div>
        </div>
        <div class="il-grid">
          <div class="il-col-2">
            <div class="il-card-1 il-shimmer"></div>
            <div class="il-card-2 il-shimmer"></div>
          </div>
          <div class="il-col-2" style="grid-column: span 1 / span 1;">
            <div class="il-card-3 il-shimmer"></div>
            <div class="il-card-2 il-shimmer"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
